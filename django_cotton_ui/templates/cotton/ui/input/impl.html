<c-vars
    type="text"
    name=""
    value=""
    placeholder=""
    size="md"
    :disabled="False"
    :readonly="False"
    :size_classes="{
        'xs': 'text-xs py-1 px-2',
        'sm': 'text-sm py-1.5 px-3',
        'md': 'text-sm py-2 px-3',
        'lg': 'text-base py-2.5 px-4',
        'xl': 'text-lg py-3 px-5',
        '2xl': 'text-xl py-3.5 px-6'
    }"
    left_addon
    right_addon
/>

<div class="relative flex items-center">
    {% if left_addon %}
        <div class="absolute left-0 inset-y-0 flex items-center pl-3 pointer-events-none text-ink-500 dark:text-ink-400">
            {{ left_addon }}
        </div>
    {% endif %}

    <input
        type="{{ type }}"
        {% if name %}name="{{ name }}"{% endif %}
        {% if value %}value="{{ value }}"{% endif %}
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if disabled %}disabled{% endif %}
        {% if readonly %}readonly{% endif %}
        {{ attrs }}
        class="block w-full rounded-control border bg-[var(--color-input-bg)] text-ink-900 dark:text-ink-100
               border-ink-300 dark:border-ink-700
               shadow-[var(--shadow-input)]
               placeholder:text-ink-400 dark:placeholder:text-ink-500
               focus-ring
               disabled:opacity-50 disabled:cursor-not-allowed
               {{ size_classes|get_item:size }}
               {% if left_addon %}pl-10{% endif %}
               {% if right_addon %}pr-10{% endif %}"
    />

    {% if right_addon %}
        <div class="absolute right-0 inset-y-0 flex items-center pr-3 pointer-events-none text-ink-500 dark:text-ink-400">
            {{ right_addon }}
        </div>
    {% endif %}
</div>
