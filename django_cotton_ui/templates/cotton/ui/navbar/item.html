<c-vars
    href="#"
    :current="False"
    class=""
/>

{% comment %}Structural link; the parent c-ui.navbar styles items per its `variant`
   via descendant selectors (keyed on the `is-current` marker), like c-ui.navlist.{% endcomment %}
<a
    href="{{ href }}"
    {% if current %}aria-current="page"{% endif %}
    class="{% if current %}is-current {% endif %}{{ class }}"
>{{ slot }}</a>
