<c-vars
    value=""
    label=""
    description=""
    icon=""
    name=""
    :disabled="False"
    :show_indicator="True"
    :accent="True"
    :checked="False"
/>

<label
    role="radio"
    data-value="{{ value }}"
    {% if checked %}data-checked="true"{% endif %}
    :aria-checked="isSelected('{{ value }}').toString()"
    :aria-disabled="{% if disabled %}true{% else %}false{% endif %}"
    :tabindex="{% if disabled %}'-1'{% else %}hasRovingTabindex('{{ value }}') ? '0' : '-1'{% endif %}"
    @click.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.enter.stop.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.space.stop.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.down.prevent="selectNext()"
    @keydown.up.prevent="selectPrevious()"
    @keydown.right.prevent="selectNext()"
    @keydown.left.prevent="selectPrevious()"
    class="flex items-start gap-3 cursor-pointer focus-ring {% if disabled %}opacity-50 cursor-not-allowed{% endif %}"
    x-bind:class="(() => {
        const variant = $el.closest('[data-variant]')?.dataset.variant || 'default';
        const classes = [];

        if (variant === 'default') {
            // Base layout classes are static, no dynamic classes needed for default
        } else if (variant === 'segmented') {
            classes.push('px-4', 'py-2', 'font-medium', 'transition-[background-color,color]', 'border-r', 'border-zinc-200', 'dark:border-zinc-700', 'last:border-r-0', 'first:rounded-l-[var(--radius-control)]', 'last:rounded-r-[var(--radius-control)]');
            if ($data.isSelected('{{ value }}')) {
                {% if accent %}
                classes.push('bg-accent', 'text-accent-foreground');
                {% else %}
                classes.push('bg-zinc-100', 'dark:bg-zinc-700');
                {% endif %}
            } else {
                classes.push('hover:bg-zinc-50', 'dark:hover:bg-zinc-700/50');
            }
        } else if (variant === 'pill') {
            classes.push('px-4', 'py-1.5', 'font-medium', 'transition-[background-color,color]', 'rounded-[calc(var(--radius-control)*0.66)]');
            if ($data.isSelected('{{ value }}')) {
                classes.push('bg-accent', 'text-accent-foreground');
            } else {
                classes.push('text-zinc-600', 'dark:text-zinc-400', 'hover:bg-zinc-100', 'dark:hover:bg-zinc-700/50');
            }
        } else if (variant === 'cards') {
            classes.push('flex', 'flex-1', 'gap-4', 'rounded-box', 'border-2', 'p-4', 'transition-[background-color]');
            if ($data.isSelected('{{ value }}')) {
                {% if accent %}
                classes.push('border-accent', 'bg-accent/5');
                {% else %}
                classes.push('border-[var(--color-muted,currentColor)]', 'bg-[color-mix(in_oklab,var(--color-muted,currentColor)_5%,transparent)]');
                {% endif %}
            } else {
                classes.push('border-zinc-200', 'dark:border-zinc-700');
            }
        }

        return classes;
    })()"
>
    {% comment %}Hidden native radio input for form submission{% endcomment %}
    <input
        type="radio"
        name="{{ name }}"
        value="{{ value }}"
        :checked="isSelected('{{ value }}')"
        {% if disabled %}disabled{% endif %}
        {% if checked %}checked{% endif %}
        tabindex="-1"
        class="sr-only"
    />

    {% comment %}Default variant structure. Use slot.strip so a whitespace-only
       default slot (left behind when only a named `icon` slot is passed) doesn't
       win over the icon/label branch.{% endcomment %}
    {% if slot.strip %}
        {{ slot }}
    {% else %}
        {% comment %}Radio indicator (default and cards variants only, hidden for segmented){% endcomment %}
        <div x-show="{% if show_indicator %}(() => { const v = $el.closest('[data-variant]')?.dataset.variant || 'default'; return v !== 'segmented' && v !== 'pill'; })(){% else %}false{% endif %}" class="flex items-center h-5">
            <div class="flex items-center justify-center w-[1.125rem] h-[1.125rem] rounded-full border transition-all shadow-sm bg-white dark:bg-white/10 border-zinc-300 dark:border-white/10">
                <div class="size-2.5 rounded-full transition-opacity"
                     :class="{
                         'opacity-100': isSelected('{{ value }}'),
                         'opacity-0': !isSelected('{{ value }}'),
                         {% if accent %}
                         'bg-accent': isSelected('{{ value }}')
                         {% else %}
                         'bg-[var(--color-muted,currentColor)]': isSelected('{{ value }}')
                         {% endif %}
                     }">
                </div>
            </div>
        </div>

        {% comment %}Icon: pass any SVG via the `icon` slot (BYO icon set).{% endcomment %}
        {% if icon %}
            <span class="flex items-center gap-2">
                <span class="inline-flex items-center shrink-0 [&>svg]:w-4 [&>svg]:h-4">{{ icon }}</span>
                {% if label %}{{ label }}{% endif %}
            </span>
        {% elif label %}
            <div class="flex-1">
                <div class="font-medium">
                    {{ label }}
                </div>
                {% if description %}
                    <div class="text-zinc-600 dark:text-zinc-400 mt-1">
                        {{ description }}
                    </div>
                {% endif %}
            </div>
        {% endif %}
    {% endif %}
</label>
