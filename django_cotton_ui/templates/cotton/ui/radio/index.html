<c-vars
    value=""
    label=""
    description=""
    icon=""
    name=""
    :disabled="False"
    :show_indicator="True"
    :accent="True"
    :checked="False"
/>

<label
    role="radio"
    data-value="{{ value }}"
    {% if checked %}data-checked="true"{% endif %}
    :aria-checked="isSelected('{{ value }}').toString()"
    :aria-disabled="{% if disabled %}true{% else %}false{% endif %}"
    :tabindex="{% if disabled %}'-1'{% else %}hasRovingTabindex('{{ value }}') ? '0' : '-1'{% endif %}"
    @click.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.enter.stop.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.space.stop.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.down.prevent="selectNext()"
    @keydown.up.prevent="selectPrevious()"
    @keydown.right.prevent="selectNext()"
    @keydown.left.prevent="selectPrevious()"
    class="flex items-start gap-3 cursor-pointer focus-ring {% if disabled %}opacity-50 cursor-not-allowed{% endif %}"
    x-bind:class="itemClasses($el, '{{ value }}', {% if accent %}true{% else %}false{% endif %})"
>
    {% comment %}Hidden native radio input for form submission{% endcomment %}
    <input
        type="radio"
        name="{{ name }}"
        value="{{ value }}"
        :checked="isSelected('{{ value }}')"
        {% if disabled %}disabled{% endif %}
        {% if checked %}checked{% endif %}
        tabindex="-1"
        class="sr-only"
    />

    {% comment %}Default variant structure. Use slot.strip so a whitespace-only
       default slot (left behind when only a named `icon` slot is passed) doesn't
       win over the icon/label branch.{% endcomment %}
    {% if slot.strip %}
        {{ slot }}
    {% else %}
        {% comment %}Radio indicator (default and cards variants only, hidden for segmented){% endcomment %}
        <div x-show="{% if show_indicator %}(() => { const v = $el.closest('[data-variant]')?.dataset.variant || 'default'; return v !== 'segmented' && v !== 'pill'; })(){% else %}false{% endif %}" class="flex items-center mt-0.5 h-5">
            <div class="flex items-center justify-center w-[1.125rem] h-[1.125rem] rounded-full border-2 border-zinc-300 dark:border-zinc-600 transition-all">
                <div class="size-2.5 rounded-full transition-opacity"
                     :class="{
                         'opacity-100': isSelected('{{ value }}'),
                         'opacity-0': !isSelected('{{ value }}'),
                         {% if accent %}
                         'bg-accent': isSelected('{{ value }}')
                         {% else %}
                         'bg-[var(--color-muted,currentColor)]': isSelected('{{ value }}')
                         {% endif %}
                     }">
                </div>
            </div>
        </div>

        {% comment %}Icon: pass any SVG via the `icon` slot (BYO icon set).{% endcomment %}
        {% if icon %}
            <span class="flex items-center gap-2">
                <span class="inline-flex items-center shrink-0 [&>svg]:w-4 [&>svg]:h-4">{{ icon }}</span>
                {% if label %}{{ label }}{% endif %}
            </span>
        {% elif label %}
            <div class="flex-1">
                <div class="font-medium">
                    {{ label }}
                </div>
                {% if description %}
                    <div class="text-zinc-600 dark:text-zinc-400 mt-1">
                        {{ description }}
                    </div>
                {% endif %}
            </div>
        {% endif %}
    {% endif %}
</label>
