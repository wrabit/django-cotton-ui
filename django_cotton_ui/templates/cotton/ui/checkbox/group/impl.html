<c-vars
    name=""
    :values="[]"
    variant="default"
    :horizontal="False"
    class=""
/>

<fieldset
    x-data='checkbox("{{ name }}", {{ values|json_dumps }})'
    role="group"
    data-variant="{{ variant }}"
    {% if variant == 'default' %}
        class="space-y-3"
    {% elif variant == 'segmented' %}
        class="inline-flex"
    {% elif variant == 'cards' %}
        class="flex gap-4"
    {% endif %}
    {{ attrs }}
>
    <div
        {% if variant == 'default' %}
            class="{% if horizontal %}flex flex-wrap items-center gap-x-6 gap-y-2{% else %}space-y-3{% endif %} {{ class }}"
        {% elif variant == 'segmented' %}
            class="inline-flex border border-ink-200 dark:border-ink-700 bg-[var(--color-input-bg)] rounded-control {{ class }}"
        {% elif variant == 'cards' %}
            class="flex gap-4 w-full {{ class }}"
        {% endif %}
    >
        {{ slot }}
    </div>
</fieldset>
