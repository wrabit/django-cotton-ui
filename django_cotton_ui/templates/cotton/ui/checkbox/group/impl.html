<c-vars
    name=""
    :values="[]"
    variant="default"
    :horizontal="False"
    class=""
/>

<fieldset
    x-data='checkbox("{{ name }}", {{ values|json_encode }})'
    role="group"
    data-variant="{{ variant }}"
    {% if variant == 'default' %}
        class="space-y-3"
    {% elif variant == 'buttons' %}
        class="inline-flex"
    {% elif variant == 'cards' %}
        class="flex gap-4"
    {% endif %}
    {{ attrs }}
>
    <div
        {% if variant == 'default' %}
            class="{% if horizontal %}flex flex-wrap items-center gap-x-6 gap-y-2{% else %}space-y-3{% endif %} {{ class }}"
        {% elif variant == 'buttons' %}
            class="inline-flex rounded-box border border-zinc-200 dark:border-zinc-700 {{ class }}"
        {% elif variant == 'cards' %}
            class="flex gap-4 w-full {{ class }}"
        {% endif %}
    >
        {{ slot }}
    </div>
</fieldset>
