<c-vars
    value=""
    label=""
    description=""
    icon=""
    name=""
    :disabled="False"
    :checked="False"
    :show_indicator="True"
    :accent="True"
/>

<label
    role="checkbox"
    data-value="{{ value }}"
    :aria-checked="isChecked('{{ value }}').toString()"
    :aria-disabled="{% if disabled %}true{% else %}false{% endif %}"
    tabindex="{% if disabled %}-1{% else %}0{% endif %}"
    @click.prevent="{% if not disabled %}toggle('{{ value }}'){% endif %}"
    @keydown.enter.stop.prevent="{% if not disabled %}toggle('{{ value }}'){% endif %}"
    @keydown.space.stop.prevent="{% if not disabled %}toggle('{{ value }}'){% endif %}"
    class="flex items-start gap-3 cursor-pointer focus-ring {% if disabled %}opacity-50 cursor-not-allowed{% endif %}"
    x-bind:class="(() => {
        const variant = $el.closest('[data-variant]')?.dataset.variant || 'default';
        const classes = [];

        if (variant === 'default') {
            // Base layout classes are static, no dynamic classes needed for default
        } else if (variant === 'segmented') {
            classes.push('px-4', 'py-2', 'font-medium', 'transition-[background-color,color]', 'border-r', 'border-ink-200', 'dark:border-ink-700', 'last:border-r-0', 'first:rounded-l-[var(--radius-control)]', 'last:rounded-r-[var(--radius-control)]');
            if ($data.isChecked('{{ value }}')) {
                {% if accent %}
                classes.push('bg-accent', 'text-accent-foreground');
                {% else %}
                classes.push('bg-ink-100', 'dark:bg-ink-700');
                {% endif %}
            } else {
                classes.push('hover:bg-ink-50', 'dark:hover:bg-ink-700/50');
            }
        } else if (variant === 'cards') {
            classes.push('flex', 'flex-1', 'gap-4', 'rounded-box', 'border-2', 'p-4', 'transition-[background-color]');
            if ($data.isChecked('{{ value }}')) {
                {% if accent %}
                classes.push('border-accent', 'bg-accent/5');
                {% else %}
                classes.push('border-[var(--color-muted,currentColor)]', 'bg-[color-mix(in_oklab,var(--color-muted,currentColor)_5%,transparent)]');
                {% endif %}
            } else {
                classes.push('border-ink-200', 'dark:border-ink-700');
            }
        }

        return classes;
    })()"
>
    {% comment %}Hidden native checkbox input for form submission{% endcomment %}
    <input
        type="checkbox"
        name="{{ name }}"
        value="{{ value }}"
        :checked="isChecked('{{ value }}')"
        {% if disabled %}disabled{% endif %}
        tabindex="-1"
        class="sr-only"
    />

    {% comment %}Default variant structure{% endcomment %}
    {% if slot %}
        {{ slot }}
    {% else %}
        {% comment %}Checkbox indicator (default and cards variants only, hidden for segmented){% endcomment %}
        <div x-show="{% if show_indicator %}(() => { const v = $el.closest('[data-variant]')?.dataset.variant || 'default'; return v !== 'segmented'; })(){% else %}false{% endif %}" class="flex items-center mt-0.5 h-5">
            <div class="flex items-center justify-center w-4 h-4 border-2 border-ink-300 dark:border-ink-600 rounded transition-all"
                 :class="{
                     {% if accent %}
                     'border-accent bg-accent': isChecked('{{ value }}'),
                     {% else %}
                     'border-[var(--color-muted,currentColor)] bg-[var(--color-muted,currentColor)]': isChecked('{{ value }}'),
                     {% endif %}
                     'border-ink-300 dark:border-ink-600': !isChecked('{{ value }}')
                 }">
                <svg class="w-3 h-3 transition-transform scale-0"
                     :class="{
                         'scale-100': isChecked('{{ value }}'),
                         'scale-0': !isChecked('{{ value }}'),
                         {% if accent %}
                         'text-accent-foreground': isChecked('{{ value }}')
                         {% else %}
                         'text-white dark:text-ink-900': isChecked('{{ value }}')
                         {% endif %}
                     }"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>

        {% comment %}Icon for buttons variant{% endcomment %}
        {% if icon %}
            <span class="flex items-center gap-2">
                <span class="inline-flex items-center shrink-0 [&>svg]:w-4 [&>svg]:h-4">{{ icon }}</span>
                {% if label %}{{ label }}{% endif %}
            </span>
        {% elif label %}
            <div class="flex-1">
                <div class="font-medium text-ink-900 dark:text-ink-100">
                    {{ label }}
                </div>
                {% if description %}
                    <div class="text-sm text-ink-600 dark:text-ink-400 mt-1">
                        {{ description }}
                    </div>
                {% endif %}
            </div>
        {% endif %}
    {% endif %}
</label>
