<c-vars
    variant="info"
    appearance="soft"
    title=""
    :icon="True"
    :dismissible="False"
    :styles="{
        'soft': {
            'info': 'bg-blue-50 dark:bg-blue-950/40 border-blue-200 dark:border-blue-900 text-blue-800 dark:text-blue-200',
            'success': 'bg-green-50 dark:bg-green-950/40 border-green-200 dark:border-green-900 text-green-800 dark:text-green-200',
            'warning': 'bg-amber-50 dark:bg-amber-950/40 border-amber-200 dark:border-amber-900 text-amber-800 dark:text-amber-200',
            'error': 'bg-red-50 dark:bg-red-950/40 border-red-200 dark:border-red-900 text-red-800 dark:text-red-200',
        },
        'solid': {
            'info': 'bg-blue-600 border-transparent text-white',
            'success': 'bg-green-600 border-transparent text-white',
            'warning': 'bg-amber-500 border-transparent text-white',
            'error': 'bg-red-600 border-transparent text-white',
        },
        'outline': {
            'info': 'bg-white dark:bg-ink-900 border-blue-300 dark:border-blue-800 text-blue-700 dark:text-blue-300',
            'success': 'bg-white dark:bg-ink-900 border-green-300 dark:border-green-800 text-green-700 dark:text-green-300',
            'warning': 'bg-white dark:bg-ink-900 border-amber-300 dark:border-amber-800 text-amber-700 dark:text-amber-300',
            'error': 'bg-white dark:bg-ink-900 border-red-300 dark:border-red-800 text-red-700 dark:text-red-300',
        },
    }"
    :icon_paths="{
        'info': 'M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z',
        'success': 'M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
        'warning': 'M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z',
        'error': 'M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
    }"
    class
/>

<div
    role="alert"
    {% if dismissible %}x-data="{ show: true }" x-show="show"{% endif %}
    {{ attrs }}
    class="flex gap-3 rounded-box border p-4 {{ styles|get_item:appearance|get_item:variant }} {{ class }}"
>
    {% if icon %}
        <svg class="size-5 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="{{ icon_paths|get_item:variant }}" />
        </svg>
    {% endif %}
    <div class="flex-1 min-w-0">
        {% if title %}<div class="font-medium">{{ title }}</div>{% endif %}
        <div class="text-sm opacity-90 {% if title %}mt-1{% endif %}">{{ slot }}</div>
    </div>
    {% if dismissible %}
        <button type="button" @click="show=false" aria-label="Dismiss" class="shrink-0 opacity-70 hover:opacity-100 transition-opacity">
            <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    {% endif %}
</div>
