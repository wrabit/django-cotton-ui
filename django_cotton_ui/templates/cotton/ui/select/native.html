<c-vars
    name=""
    placeholder="Select an option"
    value=""
    :required="False"
    :disabled="False"
    size="md"
    :size_classes="{
        'xs': 'text-xs px-2 py-1 pr-8',
        'sm': 'text-sm px-3 py-1.5 pr-10',
        'md': 'text-sm px-3 py-2 pr-10',
        'lg': 'text-base px-4 py-2.5 pr-12',
        'xl': 'text-lg px-5 py-3 pr-12',
        '2xl': 'text-xl px-6 py-3.5 pr-14'
    }"
/>

<select
    name="{{ name }}"
    {% if required %}required{% endif %}
    {% if disabled %}disabled{% endif %}
    {{ attrs }}
    class="w-full rounded-control border transition-colors appearance-none bg-[right_0.5rem_center] bg-no-repeat
           {{ size_classes|get_item:size }}
           bg-[var(--color-input-bg)] shadow-[var(--shadow-input)]
           border-ink-300 dark:border-ink-700
           focus-ring
           disabled:opacity-50 disabled:cursor-not-allowed
           [&>option]:text-ink-900 [&>option]:dark:text-ink-100 [&>option]:bg-white [&>option]:dark:bg-ink-900"
    style="background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23999%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e'); background-size: 1rem;"
>
    {% if placeholder %}
    <option value="" disabled {% if not value %}selected{% endif %}>{{ placeholder }}</option>
    {% endif %}

    {{ slot }}
</select>
