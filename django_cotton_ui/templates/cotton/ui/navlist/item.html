<c-vars
    href="#"
    :current="False"
    spy=""
    badge=""
    badge_color="zinc"
    badge_variant=""
    class=""
/>

{% comment %}`spy` opts the item into scrollspy: inside a <c-ui.scrollspy>, it smooth-scrolls to
   the section with that id on click and toggles the `.is-current` marker as the section enters
   view. `href` defaults to `#<spy>` when not set.{% endcomment %}
<a
    href="{% if spy and href == '#' %}#{{ spy }}{% else %}{{ href }}{% endif %}"
    {% if current %}aria-current="page"{% endif %}
    {% if spy %}@click.prevent="scrollTo('{{ spy }}')" :class="isActive('{{ spy }}') && 'is-current'"{% endif %}
    class="{% if current %}is-current {% endif %}{{ class }}"
    {{ attrs }}
>
    <span class="flex items-center gap-2">{{ slot }}</span>
    {% if badge %}
        <c-ui.badge color="{{ badge_color }}" variant="{{ badge_variant }}" size="sm">{{ badge }}</c-ui.badge>
    {% endif %}
</a>
