<c-vars
    heading=""
    :expandable="False"
    :expanded="True"
/>

{% if expandable %}
    <div x-data="{ expanded: {{ expanded|lower }} }" class="space-y-1">
        <button
            @click="expanded = !expanded"
            class="w-full flex items-center justify-between px-3 py-2 font-semibold text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300 transition-colors"
        >
            <span>{{ heading }}</span>
            <svg
                x-bind:class="expanded ? 'rotate-0' : '-rotate-90'"
                class="w-4 h-4 transition-transform"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
            >
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>

        <div
            x-show="expanded"
            x-collapse
            class="pl-2"
        >
            {{ slot }}
        </div>
    </div>
{% else %}
    <div class="pt-5 first:pt-0">
        {% if heading %}
            <div class="px-2 pb-2 text-sm text-zinc-400 dark:text-zinc-500">
                {{ heading }}
            </div>
        {% endif %}

        <div class="pl-2">
            {{ slot }}
        </div>
    </div>
{% endif %}
