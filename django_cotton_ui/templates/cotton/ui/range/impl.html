<c-vars name="" initial="50" min="0" max="100" step="1" :disabled="False" :accent="True" :show_value="False" value_position="right" />
<div x-data="{ val: {{ initial|default:50 }}, lo: {{ min }}, hi: {{ max }}, step: {{ step }}, get pct() { return this.hi == this.lo ? 0 : (this.val - this.lo) / (this.hi - this.lo) * 100; }, get reserve() { const dec = (String(this.step).split('.')[1] || '').length; return Math.max(String(this.lo).length, String(this.hi).length) + (dec ? dec + 1 : 0); } }" x-modelable="val" class="{% if show_value and value_position == 'right' %}flex items-center gap-3{% endif %}">
    <input type="range" x-model.number="val" {% if name %}name="{{ name }}"{% endif %} min="{{ min }}" max="{{ max }}" step="{{ step }}" value="{{ initial }}" {% if disabled %}disabled{% endif %} class="ui-range{% if not accent %} ui-range-neutral{% endif %}" :style="`--range-fill: ${pct}%`" {{ attrs }}>
    {% if show_value %}<output class="text-sm tabular-nums text-zinc-600 dark:text-zinc-400 shrink-0{% if value_position == 'below' %} mt-2 block{% else %} text-right{% endif %}"{% if value_position == 'right' %} :style="`min-width: ${reserve}ch`"{% endif %} x-text="val"></output>{% endif %}
</div>
