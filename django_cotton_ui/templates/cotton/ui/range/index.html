<c-vars
    label=""
    description=""
    description_trailing=""
    error=""
    badge=""
    form
    name=""
    value="50"
    min="0"
    max="100"
    step="1"
    :disabled="False"
    :accent="True"
    :show_value="False"
    value_position="right"
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">
        <c-ui.range.impl name="{{ name }}" initial="{{ value }}" min="{{ min }}" max="{{ max }}" step="{{ step }}" :disabled="disabled" :accent="accent" :show_value="show_value" value_position="{{ value_position }}" :attrs="attrs" />
    </c-ui.field>
{% else %}
    <c-ui.range.impl name="{{ name }}" initial="{{ value }}" min="{{ min }}" max="{{ max }}" step="{{ step }}" :disabled="disabled" :accent="accent" :show_value="show_value" value_position="{{ value_position }}" :attrs="attrs" />
{% endif %}
