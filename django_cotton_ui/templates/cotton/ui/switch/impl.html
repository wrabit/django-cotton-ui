<c-vars
    name=""
    value="on"
    :disabled="False"
    :checked="False"
    :accent="True"
    size="md"
    :size_classes="{
        'xs': 'h-4 w-7',
        'sm': 'h-5 w-9',
        'md': 'h-6 w-11',
        'lg': 'h-7 w-14',
        'xl': 'h-8 w-16',
        '2xl': 'h-9 w-[4.5rem]'
    }"
    :indicator_classes="{
        'xs': 'h-3 w-3',
        'sm': 'h-4 w-4',
        'md': 'h-5 w-5',
        'lg': 'h-6 w-6',
        'xl': 'h-7 w-7',
        '2xl': 'h-8 w-8'
    }"
/>

<div x-data='switchInput({{ disabled|lower }}, {{ checked|lower }})' class="inline-flex items-center">
    {% comment %}Hidden checkbox input for form submission{% endcomment %}
    <input
        type="checkbox"
        name="{{ name }}"
        value="{{ value }}"
        {% if disabled %}disabled{% endif %}
        class="sr-only"
        x-bind="input"
    />

    {% comment %}Switch toggle button{% endcomment %}
    <button
        type="button"
        role="switch"
        x-bind="trigger"
        {{ attrs }}
        class="relative inline-flex items-center rounded-full focus-ring
               {{ size_classes|get_item:size }}
               {% if disabled %}opacity-50 cursor-not-allowed{% else %}cursor-pointer{% endif %}"
        :class="{
            'transition-colors': ready,
            {% if accent %}
            'bg-accent': switchOn,
            {% else %}
            'bg-[var(--color-muted,currentColor)]': switchOn,
            {% endif %}
            'bg-zinc-200 dark:bg-zinc-700': !switchOn
        }"
    >
        <span
            class="inline-block transform rounded-full bg-white dark:bg-zinc-900 shadow-lg
                   {{ indicator_classes|get_item:size }}"
            :class="{
                'transition-transform': ready,
                {% comment %}On-position is symmetric: track - thumb - 0.125rem, so the right gap matches the 0.125rem top/bottom/left gap.{% endcomment %}
                {% if size == 'xs' %}
                'translate-x-[0.875rem]': switchOn,
                'translate-x-0.5': !switchOn
                {% elif size == 'sm' %}
                'translate-x-[1.125rem]': switchOn,
                'translate-x-0.5': !switchOn
                {% elif size == 'lg' %}
                'translate-x-[1.875rem]': switchOn,
                'translate-x-0.5': !switchOn
                {% elif size == 'xl' %}
                'translate-x-[2.125rem]': switchOn,
                'translate-x-0.5': !switchOn
                {% elif size == '2xl' %}
                'translate-x-[2.375rem]': switchOn,
                'translate-x-0.5': !switchOn
                {% else %}
                'translate-x-[1.375rem]': switchOn,
                'translate-x-0.5': !switchOn
                {% endif %}
            }"
        ></span>
    </button>
</div>
