<c-vars
    :open="False"
    :dismissable="True"
    size="md"
/>

<div x-data="dialog({{ open|lower }}, {{ dismissable|lower }})"
     x-bind="root"
     x-id="['dialog']"
     {{ attrs }}
>
    {# Trigger Wrapper #}
    <div x-bind="trigger" class="inline-block">
        {{ trigger }}
    </div>

    {# Teleported Overlay & Dialog #}
    <template x-teleport="body">
        <div x-bind="overlay"
             class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200"
             style="display: none;">

            <div x-bind="dialog"
                 class="
                    bg-white dark:bg-ink-900
                    text-ink-900 dark:text-ink-100
                    rounded-box shadow-xl
                    border border-[color:var(--color-box-border)]
                    w-full overflow-hidden
                    animate-in zoom-in-95 duration-200
                    relative
                    {% if size == 'sm' %}max-w-sm
                    {% elif size == 'lg' %}max-w-2xl
                    {% elif size == 'xl' %}max-w-4xl
                    {% else %}max-w-lg{% endif %}
                 "
            >
                {% if header %}
                    <div class="flex flex-col space-y-1.5 p-6 pb-0 text-center sm:text-left">
                        {{ header }}
                    </div>
                {% endif %}

                <div class="p-6">
                    {{ slot }}
                </div>

                {% if footer %}
                    <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 p-6 pt-0">
                        {{ footer }}
                    </div>
                {% endif %}

                {# Close Button #}
                <button type="button" x-bind="closeButton" class="absolute right-4 top-4 rounded-control opacity-70 focus-ring transition-opacity hover:opacity-100 disabled:pointer-events-none text-ink-500 hover:text-ink-900 dark:text-ink-400 dark:hover:text-ink-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                    <span class="sr-only">Close</span>
                </button>
            </div>
        </div>
    </template>
</div>
