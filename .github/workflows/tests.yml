name: "Tests"
run-name: "Tests (@${{ github.actor }})"

# Runs the component test suite (django_cotton_ui/tests) on every push and PR.
# No pytest: python runtests.py uses Django's built-in runner.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        django-version: ["4.2", "5.1"]
    name: "py${{ matrix.python-version }} / django${{ matrix.django-version }}"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django~=${{ matrix.django-version }}.0" "django-cotton>=2.5.0"

      - name: Run tests
        run: python runtests.py
